# E-Commerce Platform — ISLS Full-Stack Autonomy constraint file
# Usage: isls forge-v2 --requirements examples/ecommerce.toml --mock-oracle --output ./output/ecommerce

[app]
name = "ecommerce-platform"
description = "E-commerce platform with catalog, cart, orders, customers, and reviews"

[app.modules]
catalog  = "Product catalog with categories, search, and inventory management"
cart     = "Shopping cart for guests and authenticated customers"
orders   = "Order creation, status tracking, fulfillment"
customers = "Customer accounts, addresses, authentication"
auth     = "JWT authentication, role-based access (admin, customer)"

[backend]
language  = "rust"
framework = "actix-web"
database  = "postgresql"
auth_method = "jwt"

[frontend]
type    = "spa"
framework = "vanilla"
styling = "minimal"

[deployment]
containerized = true
compose = true

[constraints]
max_crates     = 1
test_coverage  = "integration"
evidence_chain = true

# ─── D2: Explicit entity definitions ─────────────────────────────────────────

[[entities]]
name = "User"
[[entities.fields]]
name = "email"
field_type = "String"
unique = true
[[entities.fields]]
name = "password_hash"
field_type = "String"
[[entities.fields]]
name = "role"
field_type = "String"
default = "'user'"
[[entities.fields]]
name = "is_active"
field_type = "bool"
default = "true"

[[entities]]
name = "Category"
[[entities.fields]]
name = "name"
field_type = "String"
[[entities.fields]]
name = "slug"
field_type = "String"
unique = true
[[entities.fields]]
name = "description"
field_type = "String"
nullable = true
[[entities.fields]]
name = "is_active"
field_type = "bool"
default = "true"

[[entities]]
name = "Product"
[[entities.fields]]
name = "name"
field_type = "String"
[[entities.fields]]
name = "slug"
field_type = "String"
unique = true
[[entities.fields]]
name = "description"
field_type = "String"
nullable = true
[[entities.fields]]
name = "price_cents"
field_type = "i64"
[[entities.fields]]
name = "compare_at_price_cents"
field_type = "i64"
nullable = true
[[entities.fields]]
name = "sku"
field_type = "String"
unique = true
[[entities.fields]]
name = "inventory_count"
field_type = "i32"
default = "0"
[[entities.fields]]
name = "is_published"
field_type = "bool"
default = "false"
[[entities.fields]]
name = "image_url"
field_type = "String"
nullable = true
[[entities.fields]]
name = "weight_grams"
field_type = "i32"
nullable = true
[[entities.foreign_keys]]
