field_type = "String"
[[entities.fields]]
name = "version"
field_type = "String"
[[entities.fields]]
name = "trigger_keywords"
field_type = "String"
[[entities.fields]]
name = "layer_count"
field_type = "i32"
[[entities.fields]]
name = "domain_count"
field_type = "i32"
[[entities.fields]]
name = "observation_count"
field_type = "i32"
[[entities.fields]]
name = "is_builtin"
field_type = "bool"
[[entities.fields]]
name = "description"
field_type = "String"
