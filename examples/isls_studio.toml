# ISLS Studio — Self-generated management interface for the norm-driven code generator
# Usage: isls forge-self --mock-oracle
#   or:  isls forge-v2 --requirements examples/isls_studio.toml --mock-oracle --output ./output/isls-studio

[app]
name = "isls-studio"
description = "ISLS Studio — management interface for norms, generations, scrape jobs, and norm wiring"

[app.modules]
norms       = "Norm catalog display, builtin and auto-discovered norms"
candidates  = "Norm candidate pool with consistency and observation tracking"
generations = "Forge generation run records with compile status and token counts"
scraping    = "Repository scrape job records with artifact and language summaries"
wiring      = "Norm-to-norm wiring with service and rule additions"
auth        = "JWT authentication, role-based access (admin, operator)"

[backend]
language  = "rust"
framework = "actix-web"
database  = "postgresql"
auth_method = "jwt"

[frontend]
type    = "spa"
framework = "vanilla"
styling = "minimal"

[deployment]
containerized = true
compose = true

[constraints]
max_crates     = 1
test_coverage  = "integration"
evidence_chain = true

# ─── D2: Explicit entity definitions ─────────────────────────────────────────

[[entities]]
name = "User"
[[entities.fields]]
name = "email"
field_type = "String"
unique = true
[[entities.fields]]
name = "password_hash"
field_type = "String"
[[entities.fields]]
name = "role"
field_type = "String"
default = "'user'"
[[entities.fields]]
name = "is_active"
field_type = "bool"
default = "true"

# ── Entity: Norm ──────────────────────────────────────────────────────────────

[[entities]]
