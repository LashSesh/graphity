<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISLS Studio</title>
<style>
/* ═══════════════════════════════════════════════════════════════════
   S1a: ISLS Studio — Visual Shell
   Dark theme, two-mode chat layout, responsive.
   Zero external dependencies.
   ═══════════════════════════════════════════════════════════════════ */

/* ── Reset & Variables ──────────────────────────────────────────── */
:root {
    --bg-primary: #0d1117;
    --bg-card: #161b22;
    --bg-input: #1c2128;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-dim: #484f58;
    --accent: #d4871b;
    --accent-success: #3fb950;
    --accent-error: #f85149;
    --accent-info: #58a6ff;
    --border: #30363d;
}

*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 15px;
    line-height: 1.6;
}

/* ── App Layout ─────────────────────────────────────────────────── */
#app {
    display: grid;
    grid-template-columns: 40px 1fr;
    grid-template-rows: 1fr;
    height: 100vh;
    width: 100vw;
}

/* ── Mode Strip ─────────────────────────────────────────────────── */
#mode-strip {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 16px;
    gap: 8px;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    z-index: 10;
}

.mode-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    border-radius: 6px;
    position: relative;
    transition: color 0.2s, background 0.2s;
}

.mode-btn:hover {
    color: var(--text-secondary);
    background: var(--bg-input);
}

.mode-btn.active {
    color: var(--accent);
}

.mode-btn.active::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
}

/* ── Main Area ──────────────────────────────────────────────────── */
#main {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    position: relative;
}

/* ── Conversation ───────────────────────────────────────────────── */
#conversation {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
}

#conversation::-webkit-scrollbar {
    width: 6px;
}

#conversation::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
}

#conversation::-webkit-scrollbar-track {
    background: transparent;
}

/* ── Empty State ────────────────────────────────────────────────── */
#empty-state {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    text-align: center;
    pointer-events: none;
    transition: opacity 0.3s;
    width: 90%;
    max-width: 500px;
}

#empty-state.hidden {
    opacity: 0;
    pointer-events: none;
}

#empty-title {
    font-size: 24px;
    color: var(--text-secondary);
    margin-bottom: 24px;
    font-weight: 400;
}

.suggestion {
    display: block;
    color: var(--text-dim);
    font-size: 14px;
    padding: 8px 16px;
    margin: 4px auto;
    cursor: pointer;
    pointer-events: auto;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    max-width: 360px;
}

.suggestion:hover {
    color: var(--text-secondary);
    background: var(--bg-card);
}

/* ── Messages ───────────────────────────────────────────────────── */
.msg {
    max-width: 720px;
    padding: 10px 16px;
    border-radius: 10px;
    word-wrap: break-word;
    white-space: pre-wrap;
    animation: msg-in 0.2s ease-out;
}

@keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}

.msg.user {
    align-self: flex-end;
    background: var(--bg-input);
    border-left: 3px solid var(--accent);
    margin-left: 60px;
}

.msg.system {
    align-self: flex-start;
    background: var(--bg-card);
    border-radius: 10px;
    margin-right: 60px;
}

.msg.process {
    align-self: flex-start;
    background: transparent;
    border-left: 2px solid var(--accent);
    padding: 6px 12px;
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
    color: var(--text-secondary);
    margin-right: 60px;
}

.msg.error {
    align-self: flex-start;
    background: rgba(248, 81, 73, 0.1);
    border-left: 3px solid var(--accent-error);
    color: var(--accent-error);
    margin-right: 60px;
}

/* ── Input Area ─────────────────────────────────────────────────── */
#input-area {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-primary);
}

#chat-input {
    flex: 1;
    background: var(--bg-input);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    resize: none;
    min-height: 42px;
    max-height: 160px;
    outline: none;
    transition: border-color 0.2s;
}

#chat-input:focus {
    border-color: var(--accent);
}

#chat-input::placeholder {
    color: var(--text-dim);
}

/* ── Readiness Ring ─────────────────────────────────────────────── */
#readiness-ring {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 7px;
}

#readiness-ring.hidden {
    display: none;
}

#readiness-ring svg {
    width: 16px;
    height: 16px;
}

#ring-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 2;
}

#ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-dasharray: 37.7;
    stroke-dashoffset: 37.7;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 0.5s ease;
}

@keyframes pulse-ring {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

#readiness-ring.full #ring-fill {
    animation: pulse-ring 2s ease-in-out infinite;
}

/* ── Send Button ────────────────────────────────────────────────── */
#send-btn {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: var(--bg-primary);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin-bottom: 3px;
    transition: opacity 0.2s;
}

#send-btn:hover {
    opacity: 0.85;
}

/* ── Responsive: Mobile ─────────────────────────────────────────── */
@media (max-width: 768px) {
    #app {
        grid-template-columns: 1fr;
        grid-template-rows: 32px 1fr;
    }

    #mode-strip {
        flex-direction: row;
        justify-content: center;
        padding-top: 0;
        gap: 16px;
        border-right: none;
        border-bottom: 1px solid var(--border);
        height: 32px;
    }

    .mode-btn {
        width: 28px;
        height: 28px;
        font-size: 15px;
    }

    .mode-btn.active::after {
        right: auto;
        bottom: -3px;
        top: auto;
        left: 50%;
        transform: translateX(-50%);
    }

    #main {
        height: calc(100vh - 32px);
    }

    #empty-title {
        font-size: 20px;
    }

    .msg.user {
        margin-left: 30px;
    }

    .msg.system,
    .msg.process,
    .msg.error {
        margin-right: 30px;
    }

    #conversation {
        padding: 16px 12px;
    }
}
</style>
</head>
<body>

<div id="app">
    <!-- Mode Strip -->
    <nav id="mode-strip">
        <button class="mode-btn active" id="btn-create" onclick="switchMode('create')" title="Erschaffen">&#10022;</button>
        <button class="mode-btn" id="btn-discover" onclick="switchMode('discover')" title="Entdecken">&#9673;</button>
    </nav>

    <!-- Main Area -->
    <div id="main">
        <!-- Empty State -->
        <div id="empty-state">
            <div id="empty-title">Was soll entstehen?</div>
            <div id="suggestions">
                <span class="suggestion" onclick="fillInput(this.textContent)">Trading Journal f&uuml;r Crypto-Portfolios</span>
                <span class="suggestion" onclick="fillInput(this.textContent)">CLI Tool zum Konvertieren von CSV</span>
                <span class="suggestion" onclick="fillInput(this.textContent)">REST API f&uuml;r Buchungsverwaltung</span>
            </div>
        </div>

        <!-- Conversation Stream -->
        <div id="conversation"></div>

        <!-- Input Area -->
        <div id="input-area">
            <textarea id="chat-input" rows="1" placeholder="Nachricht eingeben..."></textarea>

            <!-- Readiness Ring (Erschaffen only) -->
            <div id="readiness-ring" title="Readiness: 0%">
                <svg viewBox="0 0 16 16">
                    <circle id="ring-bg" cx="8" cy="8" r="6"/>
                    <circle id="ring-fill" cx="8" cy="8" r="6"/>
                </svg>
            </div>

            <button id="send-btn" onclick="sendMessage()" title="Senden">&#9654;</button>
        </div>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   S1a: JS Shell — Stubs + basic UI interaction
   ═══════════════════════════════════════════════════════════════════ */

// ── State ──────────────────────────────────────────────────────────
let currentMode = 'create';
let hasMessages = { create: false, discover: false };
let messages = { create: [], discover: [] };

// ── Placeholder Data ───────────────────────────────────────────────
const placeholders = {
    create: {
        title: 'Was soll entstehen?',
        suggestions: [
            'Trading Journal f\u00fcr Crypto-Portfolios',
            'CLI Tool zum Konvertieren von CSV',
            'REST API f\u00fcr Buchungsverwaltung'
        ]
    },
    discover: {
        title: 'Was willst du finden?',
        suggestions: [
            'rust async state machine',
            'connection pooling patterns',
            'was fehlt mir?'
        ]
    }
};

// ── DOM refs ───────────────────────────────────────────────────────
const $conv    = document.getElementById('conversation');
const $empty   = document.getElementById('empty-state');
const $title   = document.getElementById('empty-title');
const $sugg    = document.getElementById('suggestions');
const $input   = document.getElementById('chat-input');
const $ring    = document.getElementById('readiness-ring');
const $btnC    = document.getElementById('btn-create');
const $btnD    = document.getElementById('btn-discover');

// ── Mode Switching ─────────────────────────────────────────────────
function switchMode(mode) {
    if (mode === currentMode) return;
    currentMode = mode;

    $btnC.classList.toggle('active', mode === 'create');
    $btnD.classList.toggle('active', mode === 'discover');

    // Readiness ring only in create mode
    $ring.classList.toggle('hidden', mode !== 'create');

    // Update placeholder
    updateEmptyState();

    // Re-render messages for current mode
    renderAllMessages();
}

function updateEmptyState() {
    const ph = placeholders[currentMode];
    const hasMsg = hasMessages[currentMode];

    if (hasMsg) {
        $empty.classList.add('hidden');
    } else {
        $empty.classList.remove('hidden');
        $title.textContent = ph.title;
        $sugg.innerHTML = '';
        ph.suggestions.forEach(function(s) {
            var el = document.createElement('span');
            el.className = 'suggestion';
            el.textContent = s;
            el.onclick = function() { fillInput(s); };
            $sugg.appendChild(el);
        });
    }
}

// ── Message Rendering ──────────────────────────────────────────────
function renderAllMessages() {
    $conv.innerHTML = '';
    messages[currentMode].forEach(function(m) {
        appendMessageDOM(m);
    });
    scrollToBottom();
    updateEmptyState();
}

function appendMessageDOM(msg) {
    var el = document.createElement('div');
    el.className = 'msg ' + (msg.role || 'system');
    el.textContent = msg.content;
    $conv.appendChild(el);
}

function renderMessage(msg) {
    messages[currentMode].push(msg);
    hasMessages[currentMode] = true;
    $empty.classList.add('hidden');
    appendMessageDOM(msg);
    scrollToBottom();
}

function scrollToBottom() {
    $conv.scrollTop = $conv.scrollHeight;
}

// ── Send Message ───────────────────────────────────────────────────
function sendMessage() {
    var text = $input.value.trim();
    if (!text) return;

    renderMessage({ role: 'user', content: text });
    $input.value = '';
    autoResize();

    // Stub: in S1b this will call the backend
    setTimeout(function() {
        renderMessage({ role: 'system', content: 'Verbindung wird in S1b verdrahtet.' });
    }, 300);
}

// ── Input Helpers ──────────────────────────────────────────────────
function fillInput(text) {
    $input.value = text;
    $input.focus();
    autoResize();
}

function autoResize() {
    $input.style.height = 'auto';
    $input.style.height = Math.min($input.scrollHeight, 160) + 'px';
}

// ── Readiness Ring (Stub) ──────────────────────────────────────────
function updateReadiness(score) {
    var circumference = 37.7; // 2 * PI * 6
    var offset = circumference - (circumference * Math.min(score, 100) / 100);
    document.getElementById('ring-fill').style.strokeDashoffset = offset;
    $ring.title = 'Readiness: ' + Math.round(score) + '%';
    $ring.classList.toggle('full', score >= 100);
}

// ── Keyboard ───────────────────────────────────────────────────────
$input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

$input.addEventListener('input', autoResize);

// ── Touch Swipe (mobile mode switch) ───────────────────────────────
(function() {
    var startX = 0;
    document.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
    }, { passive: true });
    document.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - startX;
        if (Math.abs(dx) > 80) {
            switchMode(dx > 0 ? 'create' : 'discover');
        }
    }, { passive: true });
})();

// ── Init ───────────────────────────────────────────────────────────
updateEmptyState();
</script>
</body>
</html>
