<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISLS Studio</title>
<style>
/* ═══════════════════════════════════════════════════════════════════
   S1a: ISLS Studio — Visual Shell
   Dark theme, two-mode chat layout, responsive.
   Zero external dependencies.
   ═══════════════════════════════════════════════════════════════════ */

/* ── Reset & Variables ──────────────────────────────────────────── */
:root {
    --bg-primary: #0d1117;
    --bg-card: #161b22;
    --bg-input: #1c2128;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-dim: #484f58;
    --accent: #d4871b;
    --accent-success: #3fb950;
    --accent-error: #f85149;
    --accent-info: #58a6ff;
    --border: #30363d;
}

*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 15px;
    line-height: 1.6;
}

/* ── App Layout ─────────────────────────────────────────────────── */
#app {
    display: grid;
    grid-template-columns: 40px 1fr;
    grid-template-rows: 1fr;
    height: 100vh;
    width: 100vw;
}

/* ── Mode Strip ─────────────────────────────────────────────────── */
#mode-strip {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 16px;
    gap: 8px;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    z-index: 10;
}

.mode-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    border-radius: 6px;
    position: relative;
    transition: color 0.2s, background 0.2s;
}

.mode-btn:hover {
    color: var(--text-secondary);
    background: var(--bg-input);
}

.mode-btn.active {
    color: var(--accent);
}

.mode-btn.active::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
}

/* ── Main Area ──────────────────────────────────────────────────── */
#main {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    position: relative;
}

/* ── Conversation ───────────────────────────────────────────────── */
#conversation {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
}

#conversation::-webkit-scrollbar {
    width: 6px;
}

#conversation::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
}

#conversation::-webkit-scrollbar-track {
    background: transparent;
}

/* ── Empty State ────────────────────────────────────────────────── */
#empty-state {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    text-align: center;
    pointer-events: none;
    transition: opacity 0.3s;
    width: 90%;
    max-width: 500px;
}

#empty-state.hidden {
    opacity: 0;
    pointer-events: none;
}

#empty-title {
    font-size: 24px;
    color: var(--text-secondary);
    margin-bottom: 24px;
    font-weight: 400;
}

.suggestion {
    display: block;
    color: var(--text-dim);
    font-size: 14px;
    padding: 8px 16px;
    margin: 4px auto;
    cursor: pointer;
    pointer-events: auto;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    max-width: 360px;
}

.suggestion:hover {
    color: var(--text-secondary);
    background: var(--bg-card);
}

/* ── Messages ───────────────────────────────────────────────────── */
.msg-wrap {
    display: flex;
    flex-direction: column;
    max-width: 720px;
    animation: msg-in 0.3s ease-out;
}

.msg-wrap.user {
    align-self: flex-end;
    margin-left: 60px;
}

.msg-wrap.system,
.msg-wrap.process,
.msg-wrap.error,
.msg-wrap.entities,
.msg-wrap.repos,
.msg-wrap.gaps {
    align-self: flex-start;
    margin-right: 60px;
}

.msg {
    padding: 10px 16px;
    border-radius: 10px;
    word-wrap: break-word;
    white-space: pre-wrap;
    animation: msg-in 0.3s ease-out;
}

.msg-time {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
    padding: 0 4px;
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
}

.msg-wrap.user .msg-time { text-align: right; }
.msg-wrap.system .msg-time,
.msg-wrap.process .msg-time,
.msg-wrap.error .msg-time { text-align: left; }

@keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ── Typing Indicator ───────────────────────────────────────────── */
#typing-indicator {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    padding: 10px 16px;
    margin-right: 60px;
}

#typing-indicator.hidden { display: none; }

#typing-indicator span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: typing-dot 1.2s ease-in-out infinite;
}

#typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
#typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing-dot {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30%           { opacity: 1;   transform: translateY(-3px); }
}

/* ── Forge Live Timer ───────────────────────────────────────────── */
.forge-timer {
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    color: var(--accent);
    margin-left: 6px;
}

.msg.user {
    background: var(--bg-input);
    border-left: 3px solid var(--accent);
}

.msg.system {
    background: var(--bg-card);
    border-radius: 10px;
}

.msg.process {
    background: transparent;
    border-left: 2px solid var(--accent);
    padding: 6px 12px;
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
    color: var(--text-secondary);
}

.msg.error {
    background: rgba(248, 81, 73, 0.1);
    border-left: 3px solid var(--accent-error);
    color: var(--accent-error);
}

/* ── Input Area ─────────────────────────────────────────────────── */
#input-area {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-primary);
}

#chat-input {
    flex: 1;
    background: var(--bg-input);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    resize: none;
    min-height: 42px;
    max-height: 140px; /* ~5 lines */
    overflow-y: auto;
    outline: none;
    transition: border-color 0.2s, opacity 0.2s;
}

#chat-input:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

#chat-input:focus {
    border-color: var(--accent);
}

#chat-input::placeholder {
    color: var(--text-dim);
}

/* ── Readiness Ring ─────────────────────────────────────────────── */
#readiness-ring {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 7px;
}

#readiness-ring.hidden {
    display: none;
}

#readiness-ring svg {
    width: 16px;
    height: 16px;
}

#ring-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 2;
}

#ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-dasharray: 37.7;
    stroke-dashoffset: 37.7;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 0.5s ease;
}

@keyframes pulse-ring {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

#readiness-ring.full #ring-fill {
    animation: pulse-ring 2s ease-in-out infinite;
}

/* ── Send Button ────────────────────────────────────────────────── */
#send-btn {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: var(--bg-primary);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin-bottom: 3px;
    transition: opacity 0.2s;
}

#send-btn:hover {
    opacity: 0.85;
}

/* ── Entity Cards ───────────────────────────────────────────────── */
.entity-card {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 6px 0;
    overflow: hidden;
}

.entity-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
}

.entity-header:hover {
    background: var(--bg-card);
}

.entity-name {
    color: var(--accent);
}

.entity-toggle {
    color: var(--text-dim);
    font-size: 12px;
    transition: transform 0.2s;
}

.entity-card.expanded .entity-toggle {
    transform: rotate(180deg);
}

.entity-fields {
    display: none;
    padding: 0 12px 8px;
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
}

.entity-card.expanded .entity-fields {
    display: block;
}

.entity-field {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    color: var(--text-secondary);
}

.entity-field .f-name {
    color: var(--text-primary);
}

.entity-field .f-type {
    color: var(--text-dim);
}

/* ── Readiness Tooltip ──────────────────────────────────────────── */
#readiness-tooltip {
    display: none;
    position: absolute;
    bottom: 70px;
    right: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    max-width: 320px;
    z-index: 20;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}

#readiness-tooltip.visible {
    display: block;
}

.rt-title {
    color: var(--accent);
    margin-bottom: 6px;
    font-size: 14px;
}

.rt-item {
    padding: 2px 0;
    color: var(--text-secondary);
}

.rt-item.met {
    color: var(--accent-success);
}

.rt-item.unmet {
    color: var(--text-dim);
}

.rt-suggestion {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    color: var(--accent-info);
    font-size: 12px;
}

/* ── Forge Suggestion ───────────────────────────────────────────── */
.forge-suggest {
    display: inline-block;
    color: var(--accent);
    cursor: pointer;
    font-style: italic;
    margin-top: 4px;
}

.forge-suggest:hover {
    text-decoration: underline;
}

/* ── Repo Cards (Entdecken) ─────────────────────────────────────── */
.repo-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin: 6px 0;
}

.repo-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
}

.repo-name {
    color: var(--accent-info);
    font-size: 14px;
}

.repo-stars {
    color: var(--text-dim);
    font-size: 12px;
}

.repo-desc {
    color: var(--text-secondary);
    font-size: 13px;
    margin-bottom: 6px;
}

.repo-meta {
    color: var(--text-dim);
    font-size: 12px;
    margin-bottom: 8px;
}

.repo-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
}

.repo-action {
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    padding: 2px 0;
}

.repo-action:hover {
    text-decoration: underline;
}

.repo-action:disabled {
    color: var(--text-dim);
    cursor: default;
    text-decoration: none;
}

/* ── Gap Cards (Entdecken) ──────────────────────────────────────── */
.gap-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    margin: 4px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.gap-area {
    color: var(--text-primary);
    font-size: 14px;
}

.gap-count {
    color: var(--text-dim);
    font-size: 12px;
}

.gap-search {
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
}

.gap-search:hover {
    text-decoration: underline;
}

.covered-item {
    color: var(--accent-success);
    font-size: 13px;
    padding: 2px 0;
}

/* ── Drag-Drop Overlay ──────────────────────────────────────────── */
#drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13, 17, 23, 0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--accent);
    border: 3px dashed var(--accent);
    margin: 16px;
    border-radius: 16px;
}

#drop-overlay.active {
    display: flex;
}

/* ── Responsive: Mobile ─────────────────────────────────────────── */
@media (max-width: 768px) {
    #app {
        grid-template-columns: 1fr;
        grid-template-rows: 32px 1fr;
    }

    #mode-strip {
        flex-direction: row;
        justify-content: center;
        padding-top: 0;
        gap: 16px;
        border-right: none;
        border-bottom: 1px solid var(--border);
        height: 32px;
    }

    .mode-btn {
        width: 28px;
        height: 28px;
        font-size: 15px;
    }

    .mode-btn.active::after {
        right: auto;
        bottom: -3px;
        top: auto;
        left: 50%;
        transform: translateX(-50%);
    }

    #main {
        height: calc(100vh - 32px);
    }

    #empty-title {
        font-size: 20px;
    }

    .msg-wrap.user {
        margin-left: 30px;
    }

    .msg-wrap.system,
    .msg-wrap.process,
    .msg-wrap.error,
    .msg-wrap.entities,
    .msg-wrap.repos,
    .msg-wrap.gaps {
        margin-right: 30px;
    }

    #typing-indicator { margin-right: 30px; }

    #conversation {
        padding: 16px 12px;
    }
}
</style>
</head>
<body>

<div id="drop-overlay">Keywords-Datei hier ablegen</div>
<div id="app">
    <!-- Mode Strip -->
    <nav id="mode-strip">
        <button class="mode-btn active" id="btn-create" onclick="switchMode('create')" title="Erschaffen">&#10022;</button>
        <button class="mode-btn" id="btn-discover" onclick="switchMode('discover')" title="Entdecken">&#9673;</button>
        <button class="mode-btn" id="btn-chat" onclick="switchMode('chat')" title="Chat">&#128172;</button>
    </nav>

    <!-- Main Area -->
    <div id="main">
        <!-- Empty State -->
        <div id="empty-state">
            <div id="empty-title">Was soll entstehen?</div>
            <div id="suggestions">
                <span class="suggestion" onclick="fillInput(this.textContent)">Trading Journal f&uuml;r Crypto-Portfolios</span>
                <span class="suggestion" onclick="fillInput(this.textContent)">CLI Tool zum Konvertieren von CSV</span>
                <span class="suggestion" onclick="fillInput(this.textContent)">REST API f&uuml;r Buchungsverwaltung</span>
            </div>
        </div>

        <!-- Conversation Stream -->
        <div id="conversation">
            <div id="typing-indicator" class="hidden">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Readiness Tooltip -->
        <div id="readiness-tooltip"></div>

        <!-- Input Area -->
        <div id="input-area">
            <textarea id="chat-input" rows="1" placeholder="Nachricht eingeben..."></textarea>

            <!-- Readiness Ring (Erschaffen only) -->
            <div id="readiness-ring" title="Readiness: 0%">
                <svg viewBox="0 0 16 16">
                    <circle id="ring-bg" cx="8" cy="8" r="6"/>
                    <circle id="ring-fill" cx="8" cy="8" r="6"/>
                </svg>
            </div>

            <button id="send-btn" onclick="sendMessage()" title="Senden">&#9654;</button>
        </div>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   S1b: ISLS Studio — Erschaffen mode wired to D7 Session API
   ═══════════════════════════════════════════════════════════════════ */

// ── State ──────────────────────────────────────────────────────────
var currentMode = 'create';
var hasMessages = { create: false, discover: false, chat: false };
var messages = { create: [], discover: [], chat: [] };
var sessionId = null;
var readinessData = null;
var userScrolledUp = false;
var ws = null;
var apiKey = null;
var isBusy = false;              // input-lock while system responds
var forgeTimerInterval = null;   // live timer for forge
var forgeTimerStart = 0;

// ── Placeholder Data ───────────────────────────────────────────────
var placeholders = {
    create: {
        title: 'Was soll entstehen?',
        suggestions: [
            'Trading Journal f\u00fcr Crypto-Portfolios',
            'CLI Tool zum Konvertieren von CSV',
            'REST API f\u00fcr Buchungsverwaltung'
        ]
    },
    discover: {
        title: 'Was willst du finden?',
        suggestions: [
            'rust async state machine',
            'connection pooling patterns',
            'was fehlt mir?'
        ]
    },
    chat: {
        title: 'Frag mich etwas...',
        suggestions: [
            'Erkl\u00e4re mir Connection Pooling',
            'Welche Architektur f\u00fcr ein Trading-System?',
            'Wie funktioniert ein Event-Sourcing Pattern?'
        ]
    }
};

// ── DOM refs ───────────────────────────────────────────────────────
var $conv    = document.getElementById('conversation');
var $empty   = document.getElementById('empty-state');
var $title   = document.getElementById('empty-title');
var $sugg    = document.getElementById('suggestions');
var $input   = document.getElementById('chat-input');
var $ring    = document.getElementById('readiness-ring');
var $btnC    = document.getElementById('btn-create');
var $btnD    = document.getElementById('btn-discover');
var $btnChat = document.getElementById('btn-chat');
var $tooltip = document.getElementById('readiness-tooltip');
var $typing  = document.getElementById('typing-indicator');
var $sendBtn = document.getElementById('send-btn');

// ── API Key ────────────────────────────────────────────────────────
//
// The API key is *optional*. When the server runs with `--ollama` the
// full pipeline (chat + forge) uses the local model and no key is
// needed. Only honour an explicit `?key=...` URL parameter — never
// prompt the user. If no key is present, sessions are created without
// one and the backend falls back to its oracle_config chain
// (OpenAI server key → Ollama → manual mode).
function getApiKey() {
    if (apiKey) return apiKey;
    var params = new URLSearchParams(window.location.search);
    apiKey = params.get('key') || null;
    return apiKey;
}

// ── Mode Switching ─────────────────────────────────────────────────
function switchMode(mode) {
    if (mode === currentMode) return;
    currentMode = mode;
    $btnC.classList.toggle('active', mode === 'create');
    $btnD.classList.toggle('active', mode === 'discover');
    $btnChat.classList.toggle('active', mode === 'chat');
    $ring.classList.toggle('hidden', mode !== 'create');
    $tooltip.classList.remove('visible');
    // Placeholder text per mode
    if (mode === 'chat') {
        $input.placeholder = 'Frag mich etwas...';
    } else if (mode === 'discover') {
        $input.placeholder = 'Suchen, Scrapen, Fragen...';
    } else {
        $input.placeholder = 'Nachricht eingeben...';
    }
    updateEmptyState();
    renderAllMessages();
}

function updateEmptyState() {
    var ph = placeholders[currentMode];
    var hasMsg = hasMessages[currentMode];
    if (hasMsg) {
        $empty.classList.add('hidden');
    } else {
        $empty.classList.remove('hidden');
        $title.textContent = ph.title;
        $sugg.innerHTML = '';
        ph.suggestions.forEach(function(s) {
            var el = document.createElement('span');
            el.className = 'suggestion';
            el.textContent = s;
            el.onclick = function() { fillInput(s); };
            $sugg.appendChild(el);
        });
    }
}

// ── Message Rendering ──────────────────────────────────────────────
function formatTime(d) {
    var h = d.getHours(), m = d.getMinutes();
    return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
}

function renderAllMessages() {
    // Preserve the typing indicator element (child of #conversation).
    var keep = $typing;
    $conv.innerHTML = '';
    if (keep) $conv.appendChild(keep);
    messages[currentMode].forEach(function(m) { appendMessageDOM(m); });
    scrollToBottom();
    updateEmptyState();
}

function appendMessageDOM(msg) {
    // Legacy DOM-only entries (rendered inline elsewhere, e.g. repo/gap cards)
    if (msg._dom) return;

    var role = msg.role || 'system';
    var wrap = document.createElement('div');
    wrap.className = 'msg-wrap ' + role;

    var el = document.createElement('div');
    el.className = 'msg ' + role;

    if (role === 'entities') {
        el.className = 'msg system';
        el.innerHTML = '';
        (msg.entities || []).forEach(function(ent) {
            el.appendChild(createEntityCard(ent));
        });
    } else if (msg.html) {
        el.innerHTML = msg.html;
    } else {
        el.textContent = msg.content || '';
    }
    wrap.appendChild(el);

    // Timestamp (omit for pure process lines to keep forge/scrape noise clean)
    if (msg.time && role !== 'process') {
        var t = document.createElement('div');
        t.className = 'msg-time';
        t.textContent = msg.time;
        wrap.appendChild(t);
    }

    // Insert before typing indicator so it stays at the bottom.
    if ($typing && $typing.parentNode === $conv) {
        $conv.insertBefore(wrap, $typing);
    } else {
        $conv.appendChild(wrap);
    }

    // Expose wrapper to callers that need to mutate the DOM post-insertion
    // (e.g. the forge live timer).
    msg._wrap = wrap;
}

function renderMessage(msg) {
    if (!msg.time) msg.time = formatTime(new Date());
    messages[currentMode].push(msg);
    hasMessages[currentMode] = true;
    $empty.classList.add('hidden');
    appendMessageDOM(msg);
    smartScroll();
    return msg;
}

function smartScroll() {
    if (!userScrolledUp) {
        $conv.scrollTop = $conv.scrollHeight;
    }
}

function scrollToBottom() {
    userScrolledUp = false;
    $conv.scrollTop = $conv.scrollHeight;
}

$conv.addEventListener('scroll', function() {
    var atBottom = $conv.scrollHeight - $conv.scrollTop - $conv.clientHeight < 40;
    userScrolledUp = !atBottom;
});

// ── Entity Cards ───────────────────────────────────────────────────
function createEntityCard(ent) {
    var card = document.createElement('div');
    card.className = 'entity-card';

    var header = document.createElement('div');
    header.className = 'entity-header';
    header.innerHTML = '<span class="entity-name">' + escHtml(ent.name) +
        '</span> <span style="color:var(--text-dim)">(' + ent.field_count + ' fields)</span>' +
        ' <span class="entity-toggle">&#9660;</span>';

    var fields = document.createElement('div');

        row.className = 'entity-field';

            '</span><span class="f-type">' + escHtml(f.type || 'unknown') + '</span>';
        fields.appendChild(row);
    });

    card.appendChild(header);
    card.appendChild(fields);

}

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// ── Readiness Ring ─────────────────────────────────────────────────
function updateReadiness(data) {
    readinessData = data;
    var score = data.score || 0;
    var circumference = 37.7;
    var offset = circumference - (circumference * Math.min(score, 100) / 100);
    document.getElementById('ring-fill').style.strokeDashoffset = offset;
    $ring.title = 'Readiness: ' + Math.round(score) + '%';
    $ring.classList.toggle('full', score >= 100);
}

function showReadinessTooltip() {
    if (!readinessData) return;
    var html = '<div class="rt-title">Readiness: ' + readinessData.score + '%</div>';

    var criteria = readinessData.criteria || {};
    Object.keys(criteria).forEach(function(key) {
        var c = criteria[key];
        var icon = c.met ? '\u2713' : '\u2717';
        var cls = c.met ? 'met' : 'unmet';
        var detail = c.detail ? ' (' + c.detail + ')' : '';
        var scoreStr = c.score ? ' +' + c.score : '';
        html += '<div class="rt-item ' + cls + '">[' + icon + '] ' +
            escHtml(key) + detail + scoreStr + '</div>';
    });

    var suggestions = readinessData.suggestions || [];
    if (suggestions.length > 0) {
        html += '<div class="rt-suggestion">Tipp: ' + escHtml(suggestions[0]) + '</div>';
    }

    $tooltip.innerHTML = html;
    $tooltip.classList.toggle('visible');
}

$ring.addEventListener('click', function() {
    if (readinessData && readinessData.score >= 100) {
        triggerForge();
    } else {
        showReadinessTooltip();
    }
});

// Close tooltip on click outside
document.addEventListener('click', function(e) {
    if (!$ring.contains(e.target) && !$tooltip.contains(e.target)) {
        $tooltip.classList.remove('visible');
    }
});

// ── Session Management ─────────────────────────────────────────────
async function ensureSession() {
    if (sessionId) return sessionId;
    try {
        var body = {};
        var key = getApiKey();
        if (key) body.api_key = key;
        var resp = await fetch('/api/session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        var data = await resp.json();
        if (data.ok) {
            sessionId = data.session_id;
            return sessionId;
        }
        throw new Error(data.error || 'Session creation failed');
    } catch (err) {
        renderMessage({ role: 'error', content: 'Session-Fehler: ' + err.message });
        return null;
    }
}

// ── Send Message ───────────────────────────────────────────────────
var sending = false;

function setBusy(busy) {
    isBusy = busy;
    sending = busy;
    $input.disabled = busy;
    $sendBtn.disabled = busy;
    $sendBtn.style.opacity = busy ? '0.5' : '';
    if (busy) {
        showTyping();
    } else {
        hideTyping();
        $input.focus();
    }
}

function showTyping() {
    $typing.classList.remove('hidden');
    smartScroll();
}

function hideTyping() {
    $typing.classList.add('hidden');
}

async function sendMessage() {
    var text = $input.value.trim();
    if (!text || isBusy) return;

    $input.value = '';
    autoResize();
    renderMessage({ role: 'user', content: text });

    // Check for forge trigger words
    var lower = text.toLowerCase();
    if (currentMode === 'create' && (lower === 'forge' || lower === 'materialisieren' || lower === 'bauen')) {
        triggerForge();
        return;
    }

    setBusy(true);
    try {
        if (currentMode === 'create') {
            await sendCreateMessage(text);
        } else if (currentMode === 'chat') {
            await sendChatMessage(text);
        } else {
            await sendDiscoverMessage(text);
        }
    } finally {
        setBusy(false);
    }
}

async function sendChatMessage(text) {
    // Build history from prior chat messages (exclude the one just rendered).
    var hist = [];
    var arr = messages.chat;
    for (var i = 0; i < arr.length - 1; i++) {
        var m = arr[i];
        if (m.role === 'user') hist.push({ role: 'user', content: m.content || '' });
        else if (m.role === 'system' && m.content) hist.push({ role: 'assistant', content: m.content });
    }
    // Keep only the last 10 turns
    if (hist.length > 10) hist = hist.slice(hist.length - 10);

    try {
        var resp = await fetch('/api/chat/plain', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, history: hist })
        });
        var data = await resp.json();
        if (!data.ok) {
            renderMessage({ role: 'error', content: data.error || 'Chat-Fehler.' });
            return;
        }
        renderMessage({ role: 'system', content: (data.response || '').trim() });
    } catch (err) {
        renderMessage({ role: 'error', content: 'Netzwerkfehler: ' + err.message });
    }
}

async function sendCreateMessage(text) {
    try {
        var sid = await ensureSession();
        if (!sid) return;

        var resp = await fetch('/api/session/' + sid + '/message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });
        var data = await resp.json();

        if (!data.ok) {
            renderMessage({ role: 'error', content: data.error || 'Fehler bei der Verarbeitung.' });
            return;
        }

        // System response
        renderMessage({ role: 'system', content: data.message });

        // Entity cards if present
        if (data.spec && data.spec.entities && data.spec.entities.length > 0) {
            renderMessage({ role: 'entities', entities: data.spec.entities });
        }

        // Readiness
        if (data.readiness) {
            updateReadiness(data.readiness);

            // Suggest forge if ready
            if (data.readiness.score >= 100) {
                renderMessage({
                    role: 'system',
                    html: 'Bereit zum Materialisieren. Tippe <span class="forge-suggest" onclick="triggerForge()">forge</span> oder dr\u00fcck den Ring.'
                });
            }
        }
    } catch (err) {
        renderMessage({ role: 'error', content: 'Netzwerkfehler: ' + err.message });
    }
}

// ── Forge ──────────────────────────────────────────────────────────
var forging = false;

function startForgeTimer(msg) {
    stopForgeTimer();
    forgeTimerStart = Date.now();
    var span = document.createElement('span');
    span.className = 'forge-timer';
    span.textContent = '00:00';
    if (msg && msg._wrap) {
        var inner = msg._wrap.querySelector('.msg');
        if (inner) inner.appendChild(span);
    }
    forgeTimerInterval = setInterval(function() {
        var s = Math.floor((Date.now() - forgeTimerStart) / 1000);
        var mm = Math.floor(s / 60), ss = s % 60;
        span.textContent = (mm < 10 ? '0' : '') + mm + ':' + (ss < 10 ? '0' : '') + ss;
    }, 1000);
}

function stopForgeTimer() {
    if (forgeTimerInterval) {
        clearInterval(forgeTimerInterval);
        forgeTimerInterval = null;
    }
}

async function triggerForge() {
    if (forging || !sessionId) return;
    forging = true;

    var startMsg = renderMessage({ role: 'process', content: 'Materialisierung gestartet...' });
    startForgeTimer(startMsg);

    try {
        var resp = await fetch('/api/session/' + sessionId + '/forge', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
        });
        var data = await resp.json();

        if (!data.ok) {
            renderMessage({ role: 'error', content: data.error || 'Forge konnte nicht gestartet werden.' });
            if (data.readiness) updateReadiness(data.readiness);
            forging = false;
            stopForgeTimer();
            return;
        }

        renderMessage({ role: 'process', content: 'Forge gestartet. Output: ' + (data.output_dir || '...') });
        // Progress comes via WebSocket
    } catch (err) {
        renderMessage({ role: 'error', content: 'Forge-Fehler: ' + err.message });
        forging = false;
        stopForgeTimer();
    }
}

// ── Entdecken Mode ─────────────────────────────────────────────────
async function sendDiscoverMessage(text) {
    var lower = text.toLowerCase().trim();
    try {
        // "was fehlt mir?" handler
        if (lower.indexOf('was fehlt') >= 0) {
            await discoverGaps();
        }
        // Norm genealogy handler
        else if (lower.match(/isls-(?:norm|cand)-(?:auto-)?\d+/i)) {
            var match = lower.match(/(isls-(?:norm|cand)-(?:auto-)?\d+)/i);
            if (match) await discoverGenealogy(match[1].toUpperCase());
        }
        // Mass-scrape: "scrape diese keywords: X, Y, Z"
        else if (lower.indexOf('scrape diese keywords') >= 0 || lower.indexOf('scrape keywords') >= 0) {
            var afterColon = text.split(':').slice(1).join(':');
            var kws = afterColon.split(',').map(function(k) { return k.trim(); }).filter(Boolean);
            if (kws.length > 0) await discoverMassScrape(kws);
            else renderMessage({ role: 'error', content: 'Keine Keywords gefunden. Format: scrape diese keywords: X, Y, Z' });
        }
        // Default: GitHub search
        else {
            await discoverSearch(text);
        }
    } catch (err) {
        renderMessage({ role: 'error', content: 'Fehler: ' + err.message });
    }
}

async function discoverSearch(query) {
    renderMessage({ role: 'process', content: 'Suche auf GitHub: "' + query + '"...' });
    var resp = await fetch('/api/discover/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: query, max_results: 8 })
    });
    var data = await resp.json();
    if (!data.ok) {
        renderMessage({ role: 'error', content: data.error || 'Suche fehlgeschlagen.' });
        return;
    }
    var repos = (data.data && data.data.repos) || [];
    var total = data.data && data.data.total_count;
    if (repos.length === 0) {
        renderMessage({ role: 'system', content: 'Keine Repos gefunden.' });
        return;
    }
    renderMessage({ role: 'system', content: repos.length + ' Repos gefunden' + (total ? ' (von ' + total + ' gesamt)' : '') + ':' });
    // Render repo cards
    var wrap = document.createElement('div');
    wrap.className = 'msg-wrap system';
    var el = document.createElement('div');
    el.className = 'msg system';
    repos.forEach(function(r) { el.appendChild(createRepoCard(r)); });
    wrap.appendChild(el);
    messages[currentMode].push({ role: 'repos', _dom: true });
    hasMessages[currentMode] = true;
    if ($typing && $typing.parentNode === $conv) $conv.insertBefore(wrap, $typing);
    else $conv.appendChild(wrap);
    smartScroll();
}

function createRepoCard(repo) {
    var card = document.createElement('div');
    card.className = 'repo-card';

    var stars = repo.stargazers_count || 0;
    var starsStr = stars >= 1000 ? (stars / 1000).toFixed(1) + 'k' : stars;

    card.innerHTML =
        '<div class="repo-header"><span class="repo-name">' + escHtml(repo.full_name || '') +
        '</span><span class="repo-stars">' + starsStr + ' \u2B50</span></div>' +
        '<div class="repo-desc">' + escHtml(repo.description || 'No description') + '</div>' +
        '<div class="repo-meta">' + escHtml(repo.language || 'Unknown') + '</div>' +
        '<div class="repo-actions">' +
        '<button class="repo-action" data-action="xray">R\u00f6ntgen</button>' +
        '<button class="repo-action" data-action="scrape">Scrape</button>' +
        '</div>';

    var cloneUrl = repo.clone_url || repo.html_url;
    var fullName = repo.full_name || '';

    card.querySelector('[data-action="xray"]').onclick = function() {
        this.disabled = true;
        this.textContent = '...';
        discoverXray(cloneUrl, fullName, card);
    };
    card.querySelector('[data-action="scrape"]').onclick = function() {
        this.disabled = true;
        this.textContent = '...';
        discoverScrapeRepo(cloneUrl, fullName, card);
    };

    return card;
}

async function discoverXray(url, name, cardEl) {
    renderMessage({ role: 'process', content: 'R\u00f6ntgen: ' + name + ' ...' });
    try {
        var resp = await fetch('/api/discover/xray', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url })
        });
        var data = await resp.json();
        if (!data.ok) {
            renderMessage({ role: 'error', content: 'X-Ray fehlgeschlagen: ' + (data.error || '') });
            return;
        }
        var d = data.data || {};
        var topo = d.topology || {};
        var langs = topo.language_breakdown || {};
        var langStr = Object.keys(langs).map(function(k) { return k + ' (' + langs[k] + ' LOC)'; }).join(', ');
        var layers = (topo.layers || []).join(', ');
        var lines = [
            'Topologie: ' + name,
            '  Sprachen: ' + (langStr || 'unknown'),
            '  ' + (d.fn_count || 0) + ' Functions, ' + (d.struct_count || 0) + ' Structs, ' + (d.table_count || 0) + ' Tables',
            '  Layers: ' + (layers || 'none'),
            '  Connectivity: ' + ((topo.connectivity || 0).toFixed(3)),
            '  LOC: ' + (d.total_loc || 0),
        ];
        renderMessage({ role: 'process', content: lines.join('\n') });
    } catch (err) {
        renderMessage({ role: 'error', content: 'X-Ray Fehler: ' + err.message });
    }
}

async function discoverScrapeRepo(url, name, cardEl) {
    renderMessage({ role: 'process', content: 'Scrape: ' + name + ' ...' });
    try {
        var resp = await fetch('/api/discover/scrape', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url })
        });
        var data = await resp.json();
        if (!data.ok) {
            renderMessage({ role: 'error', content: 'Scrape fehlgeschlagen: ' + (data.error || '') });
            return;
        }
        var d = data.data || {};
        var norms = d.norms || {};
        var line = '\u2713 ' + name + ' gescrapt \u2014 ' + (d.artifact_count || 0) + ' Artifacts, ' +
            Object.keys(d.layers || {}).length + ' Layers';
        if (norms.new_candidates) line += '\nNeue Candidates: ' + norms.new_candidates;
        if (norms.new_norms) line += '\nNeue Auto-Norms: ' + norms.new_norms;
        renderMessage({ role: 'system', content: line });
    } catch (err) {
        renderMessage({ role: 'error', content: 'Scrape Fehler: ' + err.message });
    }
}

async function discoverGaps() {
    renderMessage({ role: 'process', content: 'Analysiere Norm-Katalog...' });
    try {
        var resp = await fetch('/api/discover/gaps');
        var data = await resp.json();
        if (!data.ok) {
            renderMessage({ role: 'error', content: data.error || 'Gap-Analyse fehlgeschlagen.' });
            return;
        }
        var summary = 'Dein Norm-Katalog: ' + data.total_norms + ' Norms (' +
            data.builtin + ' builtin, ' + data.auto + ' auto)\nCandidates: ' + data.candidates;
        renderMessage({ role: 'system', content: summary });

        // Render gaps as cards
        var gaps = data.gaps || [];
        if (gaps.length > 0) {
            renderMessage({ role: 'system', content: 'Schwach abgedeckte Bereiche:' });
            var wrap = document.createElement('div');
            wrap.className = 'msg-wrap system';
            var el = document.createElement('div');
            el.className = 'msg system';
            gaps.forEach(function(g) {
                var card = document.createElement('div');
                card.className = 'gap-card';
                card.innerHTML =
                    '<div><span class="gap-area">' + escHtml(g.area) + '</span> ' +
                    '<span class="gap-count">' + g.norm_count + ' Norms</span></div>' +
                    '<button class="gap-search">[Suchen]</button>';
                card.querySelector('.gap-search').onclick = function() {
                    fillInput(g.suggested_query);
                    sendMessage();
                };
                el.appendChild(card);
            });
            wrap.appendChild(el);
            messages[currentMode].push({ role: 'gaps', _dom: true });
            hasMessages[currentMode] = true;
            if ($typing && $typing.parentNode === $conv) $conv.insertBefore(wrap, $typing);
            else $conv.appendChild(wrap);
            smartScroll();
        }

        // Show covered areas
        var covered = data.covered || [];
        if (covered.length > 0) {
            var covLines = 'Gut abgedeckt:\n' + covered.map(function(c) {
                return '  \u2713 ' + c.area + ' (' + c.keyword_matches + ' Treffer)';
            }).join('\n');
            renderMessage({ role: 'system', content: covLines });
        }
    } catch (err) {
        renderMessage({ role: 'error', content: 'Gap-Analyse Fehler: ' + err.message });
    }
}

async function discoverGenealogy(normId) {
    renderMessage({ role: 'process', content: 'Lade Abstammung: ' + normId + '...' });
    try {
        var resp = await fetch('/api/discover/genealogy/' + encodeURIComponent(normId));
        var data = await resp.json();
        if (!data.ok) {
            renderMessage({ role: 'error', content: data.error || 'Norm nicht gefunden.' });
            return;
        }
        var lines = [data.id + ' "' + (data.name || '') + '"'];
        if (data.level) lines.push('Level: ' + data.level);
        if (data.evidence) {
            lines.push('Builtin: ' + (data.evidence.builtin ? 'Ja' : 'Nein'));
            if (data.evidence.domains_used && data.evidence.domains_used.length)
                lines.push('Domains: ' + data.evidence.domains_used.join(', '));
            if (data.evidence.signature)
                lines.push('Signatur: ' + data.evidence.signature.substring(0, 16) + '...');
        }
        if (data.candidate) {
            var c = data.candidate;
            lines.push('\nAbstammung:');
            lines.push('  Observations: ' + c.observation_count);
            lines.push('  Domains: ' + (c.domains || []).join(', '));
            lines.push('  Consistency: ' + (c.consistency || 0).toFixed(2));
            if (c.consistent_layers) lines.push('  Layers: ' + c.consistent_layers.join(', '));
            (c.observations || []).forEach(function(o) {
                lines.push('  - ' + o.entity + ' (' + o.domain + ', ' + o.run_id + ')');
            });
        }
        // Also handle candidate-type responses
        if (data.type === 'candidate') {
            lines = [data.id + ' (Candidate)'];
            lines.push('Status: ' + (data.status || ''));
            lines.push('Observations: ' + (data.observation_count || 0));
            lines.push('Domains: ' + (data.domains || []).join(', '));
            lines.push('Consistency: ' + (data.consistency || 0).toFixed(2));
        }
        renderMessage({ role: 'system', content: lines.join('\n') });
    } catch (err) {
        renderMessage({ role: 'error', content: 'Genealogie-Fehler: ' + err.message });
    }
}

async function discoverMassScrape(keywords) {

// ── WebSocket ──────────────────────────────────────────────────────
function connectWs() {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var url = proto + '//' + location.host + '/events';
    try {
        ws = new WebSocket(url);
    } catch (e) { return; }

    ws.onopen = function() {
        ws.send(JSON.stringify({ subscribe: ['forge_progress', 'discover_keyword', 'discover_repo', 'discover_complete'] }));
    };

    ws.onmessage = function(evt) {
        try {
            var event = JSON.parse(evt.data);
            handleWsEvent(event);
        } catch (e) {}
    };

    ws.onclose = function() {
        ws = null;
        // Reconnect after 3s
        setTimeout(connectWs, 3000);
    };

    ws.onerror = function() {
        if (ws) ws.close();
    };
}

function handleWsEvent(event) {
    var d = event.data || {};
    var evType = d.type || '';

    // Discover events
    if (event.type === 'discover_keyword' || event.type === 'discover_repo' || event.type === 'discover_complete') {
        handleDiscoverWsEvent(event);
        return;
    }

    if (event.type !== 'forge_progress') return;

    if (evType === 'forge:start') {
        renderMessage({ role: 'process', content: 'HDAG wird aufgebaut...' });
    } else if (evType === 'forge:node') {
        var line = '[' + d.index + '/' + d.total + '] ' + (d.file || d.atom_name || '');
        if (d.source) line += '  [' + d.source + ']';
        renderMessage({ role: 'process', content: line });
    } else if (evType === 'forge:compile') {
        var status = d.status === 'passed' ? '\u2713 PASSED' : '\u2717 FAILED';
        renderMessage({ role: 'process', content: 'cargo check: ' + status });
    } else if (evType === 'forge:complete') {
        forging = false;
        stopForgeTimer();
        if (d.success) {
            var summary = 'Fertig. ' + (d.files || 0) + ' Dateien, ' +
                (d.loc || 0) + ' LOC, ' + (d.duration_secs || 0).toFixed(1) + 's.';
            if (d.output_dir) summary += '\nErgebnis: ' + d.output_dir;
            renderMessage({ role: 'system', content: summary });
        } else {
            renderMessage({ role: 'error', content: 'Forge fehlgeschlagen: ' + (d.error || 'Unbekannter Fehler') });
        }
    } else {
        // Generic forge progress
        if (d.phase) {
            var line = d.phase;
            if (d.index !== undefined) line = '[' + d.index + '/' + (d.total || '?') + '] ' + line;
            if (d.atom_name) line += ' ' + d.atom_name;
            if (d.source) line += '  [' + d.source + ']';
            if (d.status) line += ' — ' + d.status;
            renderMessage({ role: 'process', content: line });
        }
    }
}

// ── Input Helpers ──────────────────────────────────────────────────
function fillInput(text) {
    $input.value = text;
    $input.focus();
    autoResize();
}

function autoResize() {
    $input.style.height = 'auto';
    $input.style.height = Math.min($input.scrollHeight, 140) + 'px';
}

// ── Keyboard ───────────────────────────────────────────────────────
$input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

$input.addEventListener('input', autoResize);

// ── Touch Swipe (mobile mode switch) ───────────────────────────────
(function() {
    var MODES = ['create', 'discover', 'chat'];
    var startX = 0;
    document.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
    }, { passive: true });
    document.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - startX;
        if (Math.abs(dx) > 80) {
            var idx = MODES.indexOf(currentMode);
            if (idx < 0) idx = 0;
            var next = dx < 0 ? idx + 1 : idx - 1;
            if (next < 0) next = 0;
            if (next >= MODES.length) next = MODES.length - 1;
            switchMode(MODES[next]);
        }
    }, { passive: true });
})();

// ── Discover WebSocket Events ──────────────────────────────────────
function handleDiscoverWsEvent(event) {
    var d = event.data || {};
    var evType = d.type || '';

    if (evType === 'discover:keyword') {
        renderMessage({ role: 'process', content: '[' + d.index + '/' + d.total + '] "' + (d.keyword || '') + '"' });
    } else if (evType === 'discover:repo') {
        var line = '  ' + (d.repo || '') + ' \u2192 ' + (d.artifacts || 0) + ' artifacts';
        renderMessage({ role: 'process', content: line });
    } else if (evType === 'discover:complete') {
        var summary = 'Massen-Scraping abgeschlossen.\n' +
            (d.repos_scraped || 0) + ' Repos gescrapt, ' + (d.repos_failed || 0) + ' fehlgeschlagen.\n' +
            'Neue Candidates: ' + (d.new_candidates || 0) + '\n' +
            'Neue Auto-Norms: ' + (d.new_norms || 0);
        renderMessage({ role: 'system', content: summary });
    }
}

// ── Drag & Drop Keyword Upload ────────────────────────────────────
(function() {
    var $drop = document.getElementById('drop-overlay');
    var dragCounter = 0;

    document.addEventListener('dragenter', function(e) {
        e.preventDefault();
        dragCounter++;
        if (currentMode === 'discover') $drop.classList.add('active');
    });

    document.addEventListener('dragleave', function(e) {
        e.preventDefault();
        dragCounter--;
        if (dragCounter <= 0) { dragCounter = 0; $drop.classList.remove('active'); }
    });

    document.addEventListener('dragover', function(e) {
        e.preventDefault();
    });

    document.addEventListener('drop', function(e) {
        e.preventDefault();
        dragCounter = 0;
        $drop.classList.remove('active');

        if (currentMode !== 'discover') return;

        var files = e.dataTransfer && e.dataTransfer.files;
        if (!files || files.length === 0) return;

        var file = files[0];
        if (!file.name.endsWith('.txt')) {
            renderMessage({ role: 'error', content: 'Nur .txt Dateien werden unterstuetzt.' });
            return;
        }

        var reader = new FileReader();
        reader.onload = function(ev) {
            var text = ev.target.result;
            var lines = text.split('\n').map(function(l) { return l.trim(); })
                .filter(function(l) { return l && !l.startsWith('#'); });
            renderMessage({ role: 'user', content: '[Upload: ' + file.name + ' \u2014 ' + lines.length + ' Keywords]' });
            discoverUploadKeywords(text);
        };
        reader.readAsText(file);
    });
})();

// ── Init ───────────────────────────────────────────────────────────
updateEmptyState();
connectWs();
</script>
