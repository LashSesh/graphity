<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISLS Studio</title>
<style>
/* ═══════════════════════════════════════════════════════════════════
   S1a: ISLS Studio — Visual Shell
   Dark theme, two-mode chat layout, responsive.
   Zero external dependencies.
   ═══════════════════════════════════════════════════════════════════ */

/* ── Reset & Variables ──────────────────────────────────────────── */
:root {
    --bg-primary: #0d1117;
    --bg-card: #161b22;
    --bg-input: #1c2128;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-dim: #484f58;
    --accent: #d4871b;
    --accent-success: #3fb950;
    --accent-error: #f85149;
    --accent-info: #58a6ff;
    --border: #30363d;
}

*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 15px;
    line-height: 1.6;
}

/* ── App Layout ─────────────────────────────────────────────────── */
#app {
    display: grid;
    grid-template-columns: 40px 1fr;
    grid-template-rows: 1fr;
    height: 100vh;
    width: 100vw;
}

/* ── Mode Strip ─────────────────────────────────────────────────── */
#mode-strip {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 16px;
    gap: 8px;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    z-index: 10;
}

.mode-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    border-radius: 6px;
    position: relative;
    transition: color 0.2s, background 0.2s;
}

.mode-btn:hover {
    color: var(--text-secondary);
    background: var(--bg-input);
}

.mode-btn.active {
    color: var(--accent);
}

.mode-btn.active::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
}

/* ── Main Area ──────────────────────────────────────────────────── */
#main {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    position: relative;
}

/* ── Conversation ───────────────────────────────────────────────── */
#conversation {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
}

#conversation::-webkit-scrollbar {
    width: 6px;
}

#conversation::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
}

#conversation::-webkit-scrollbar-track {
    background: transparent;
}

/* ── Empty State ────────────────────────────────────────────────── */
#empty-state {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    text-align: center;
    pointer-events: none;
    transition: opacity 0.3s;
    width: 90%;
    max-width: 500px;
}

#empty-state.hidden {
    opacity: 0;
    pointer-events: none;
}

#empty-title {
    font-size: 24px;
    color: var(--text-secondary);
    margin-bottom: 24px;
    font-weight: 400;
}

.suggestion {
    display: block;
    color: var(--text-dim);
    font-size: 14px;
    padding: 8px 16px;
    margin: 4px auto;
    cursor: pointer;
    pointer-events: auto;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    max-width: 360px;
}

.suggestion:hover {
    color: var(--text-secondary);
    background: var(--bg-card);
}

/* ── Messages ───────────────────────────────────────────────────── */
.msg {
    max-width: 720px;
    padding: 10px 16px;
    border-radius: 10px;
    word-wrap: break-word;
    white-space: pre-wrap;
    animation: msg-in 0.2s ease-out;
}

@keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}

.msg.user {
    align-self: flex-end;
    background: var(--bg-input);
    border-left: 3px solid var(--accent);
    margin-left: 60px;
}

.msg.system {
    align-self: flex-start;
    background: var(--bg-card);
    border-radius: 10px;
    margin-right: 60px;
}

.msg.process {
    align-self: flex-start;
    background: transparent;
    border-left: 2px solid var(--accent);
    padding: 6px 12px;
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
    color: var(--text-secondary);
    margin-right: 60px;
}

.msg.error {
    align-self: flex-start;
    background: rgba(248, 81, 73, 0.1);
    border-left: 3px solid var(--accent-error);
    color: var(--accent-error);
    margin-right: 60px;
}

/* ── Input Area ─────────────────────────────────────────────────── */
#input-area {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-primary);
}

#chat-input {
    flex: 1;
    background: var(--bg-input);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    resize: none;
    min-height: 42px;
    max-height: 160px;
    outline: none;
    transition: border-color 0.2s;
}

#chat-input:focus {
    border-color: var(--accent);
}

#chat-input::placeholder {
    color: var(--text-dim);
}

/* ── Readiness Ring ─────────────────────────────────────────────── */
#readiness-ring {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 7px;
}

#readiness-ring.hidden {
    display: none;
}

#readiness-ring svg {
    width: 16px;
    height: 16px;
}

#ring-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 2;
}

#ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-dasharray: 37.7;
    stroke-dashoffset: 37.7;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 0.5s ease;
}

@keyframes pulse-ring {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

#readiness-ring.full #ring-fill {
    animation: pulse-ring 2s ease-in-out infinite;
}

/* ── Send Button ────────────────────────────────────────────────── */
#send-btn {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: var(--bg-primary);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin-bottom: 3px;
    transition: opacity 0.2s;
}

#send-btn:hover {
    opacity: 0.85;
}

/* ── Entity Cards ───────────────────────────────────────────────── */
.entity-card {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 6px 0;
    overflow: hidden;
}

.entity-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
}

.entity-header:hover {
    background: var(--bg-card);
}

.entity-name {
    color: var(--accent);
}

.entity-toggle {
    color: var(--text-dim);
    font-size: 12px;
    transition: transform 0.2s;
}

.entity-card.expanded .entity-toggle {
    transform: rotate(180deg);
}

.entity-fields {
    display: none;
    padding: 0 12px 8px;
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
}

.entity-card.expanded .entity-fields {
    display: block;
}

.entity-field {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    color: var(--text-secondary);
}

.entity-field .f-name {
    color: var(--text-primary);
}

.entity-field .f-type {
    color: var(--text-dim);
}

/* ── Readiness Tooltip ──────────────────────────────────────────── */
#readiness-tooltip {
    display: none;
    position: absolute;
    bottom: 70px;
    right: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    max-width: 320px;
    z-index: 20;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}

#readiness-tooltip.visible {
    display: block;
}

.rt-title {
    color: var(--accent);
    margin-bottom: 6px;
    font-size: 14px;
}

.rt-item {
    padding: 2px 0;
    color: var(--text-secondary);
}

.rt-item.met {
    color: var(--accent-success);
}

.rt-item.unmet {
    color: var(--text-dim);
}

.rt-suggestion {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    color: var(--accent-info);
    font-size: 12px;
}

/* ── Forge Suggestion ───────────────────────────────────────────── */
.forge-suggest {
    display: inline-block;
    color: var(--accent);
    cursor: pointer;
    font-style: italic;
    margin-top: 4px;
}

.forge-suggest:hover {
    text-decoration: underline;
}

/* ── Responsive: Mobile ─────────────────────────────────────────── */
@media (max-width: 768px) {
    #app {
        grid-template-columns: 1fr;
        grid-template-rows: 32px 1fr;
    }

    #mode-strip {
        flex-direction: row;
        justify-content: center;
        padding-top: 0;
        gap: 16px;
        border-right: none;
        border-bottom: 1px solid var(--border);
        height: 32px;
    }

    .mode-btn {
        width: 28px;
        height: 28px;
        font-size: 15px;
    }

    .mode-btn.active::after {
        right: auto;
        bottom: -3px;
        top: auto;
        left: 50%;
        transform: translateX(-50%);
    }

    #main {
        height: calc(100vh - 32px);
    }

    #empty-title {
        font-size: 20px;
    }

    .msg.user {
        margin-left: 30px;
    }

    .msg.system,
    .msg.process,
    .msg.error {
        margin-right: 30px;
    }

    #conversation {
        padding: 16px 12px;
    }
}
</style>
</head>
<body>

<div id="app">
    <!-- Mode Strip -->
    <nav id="mode-strip">
        <button class="mode-btn active" id="btn-create" onclick="switchMode('create')" title="Erschaffen">&#10022;</button>
        <button class="mode-btn" id="btn-discover" onclick="switchMode('discover')" title="Entdecken">&#9673;</button>
    </nav>

    <!-- Main Area -->
    <div id="main">
        <!-- Empty State -->
        <div id="empty-state">
            <div id="empty-title">Was soll entstehen?</div>
            <div id="suggestions">
                <span class="suggestion" onclick="fillInput(this.textContent)">Trading Journal f&uuml;r Crypto-Portfolios</span>
                <span class="suggestion" onclick="fillInput(this.textContent)">CLI Tool zum Konvertieren von CSV</span>
                <span class="suggestion" onclick="fillInput(this.textContent)">REST API f&uuml;r Buchungsverwaltung</span>
            </div>
        </div>

        <!-- Conversation Stream -->
        <div id="conversation"></div>

        <!-- Readiness Tooltip -->
        <div id="readiness-tooltip"></div>

        <!-- Input Area -->
        <div id="input-area">
            <textarea id="chat-input" rows="1" placeholder="Nachricht eingeben..."></textarea>

            <!-- Readiness Ring (Erschaffen only) -->
            <div id="readiness-ring" title="Readiness: 0%">
                <svg viewBox="0 0 16 16">
                    <circle id="ring-bg" cx="8" cy="8" r="6"/>
                    <circle id="ring-fill" cx="8" cy="8" r="6"/>
                </svg>
            </div>

            <button id="send-btn" onclick="sendMessage()" title="Senden">&#9654;</button>
        </div>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   S1b: ISLS Studio — Erschaffen mode wired to D7 Session API
   ═══════════════════════════════════════════════════════════════════ */

// ── State ──────────────────────────────────────────────────────────
var currentMode = 'create';
var hasMessages = { create: false, discover: false };
var messages = { create: [], discover: [] };
var sessionId = null;
var readinessData = null;
var userScrolledUp = false;
var ws = null;
var apiKey = null;

// ── Placeholder Data ───────────────────────────────────────────────
var placeholders = {
    create: {
        title: 'Was soll entstehen?',
        suggestions: [
            'Trading Journal f\u00fcr Crypto-Portfolios',
            'CLI Tool zum Konvertieren von CSV',
            'REST API f\u00fcr Buchungsverwaltung'
        ]
    },
    discover: {
        title: 'Was willst du finden?',
        suggestions: [
            'rust async state machine',
            'connection pooling patterns',
            'was fehlt mir?'
        ]
    }
};

// ── DOM refs ───────────────────────────────────────────────────────
var $conv    = document.getElementById('conversation');
var $empty   = document.getElementById('empty-state');
var $title   = document.getElementById('empty-title');
var $sugg    = document.getElementById('suggestions');
var $input   = document.getElementById('chat-input');
var $ring    = document.getElementById('readiness-ring');
var $btnC    = document.getElementById('btn-create');
var $btnD    = document.getElementById('btn-discover');
var $tooltip = document.getElementById('readiness-tooltip');

// ── API Key ────────────────────────────────────────────────────────
function getApiKey() {
    if (apiKey) return apiKey;
    var params = new URLSearchParams(window.location.search);
    apiKey = params.get('key') || null;
    if (!apiKey) {
        apiKey = prompt('OpenAI API Key (oder leer fuer manuellen Modus):');
        if (apiKey === '') apiKey = null;
    }
    return apiKey;
}

// ── Mode Switching ─────────────────────────────────────────────────
function switchMode(mode) {
    if (mode === currentMode) return;
    currentMode = mode;
    $btnC.classList.toggle('active', mode === 'create');
    $btnD.classList.toggle('active', mode === 'discover');
    $ring.classList.toggle('hidden', mode !== 'create');
    $tooltip.classList.remove('visible');
    updateEmptyState();
    renderAllMessages();
}

function updateEmptyState() {
    var ph = placeholders[currentMode];
    var hasMsg = hasMessages[currentMode];
    if (hasMsg) {
        $empty.classList.add('hidden');
    } else {
        $empty.classList.remove('hidden');
        $title.textContent = ph.title;
        $sugg.innerHTML = '';
        ph.suggestions.forEach(function(s) {
            var el = document.createElement('span');
            el.className = 'suggestion';
            el.textContent = s;
            el.onclick = function() { fillInput(s); };
            $sugg.appendChild(el);
        });
    }
}

// ── Message Rendering ──────────────────────────────────────────────
function renderAllMessages() {
    $conv.innerHTML = '';
    messages[currentMode].forEach(function(m) { appendMessageDOM(m); });
    scrollToBottom();
    updateEmptyState();
}

function appendMessageDOM(msg) {
    var el = document.createElement('div');
    el.className = 'msg ' + (msg.role || 'system');

    if (msg.role === 'entities') {
        el.className = 'msg system';
        el.innerHTML = '';
        msg.entities.forEach(function(ent) {
            el.appendChild(createEntityCard(ent));
        });
    } else if (msg.html) {
        el.innerHTML = msg.html;
    } else {
        el.textContent = msg.content || '';
    }

    $conv.appendChild(el);
}

function renderMessage(msg) {
    messages[currentMode].push(msg);
    hasMessages[currentMode] = true;
    $empty.classList.add('hidden');
    appendMessageDOM(msg);
    smartScroll();
}

function smartScroll() {
    if (!userScrolledUp) {
        $conv.scrollTop = $conv.scrollHeight;
    }
}

function scrollToBottom() {
    userScrolledUp = false;
    $conv.scrollTop = $conv.scrollHeight;
}

$conv.addEventListener('scroll', function() {
    var atBottom = $conv.scrollHeight - $conv.scrollTop - $conv.clientHeight < 40;
    userScrolledUp = !atBottom;
});

// ── Entity Cards ───────────────────────────────────────────────────
function createEntityCard(ent) {
    var card = document.createElement('div');
    card.className = 'entity-card';

    var header = document.createElement('div');
    header.className = 'entity-header';
    header.innerHTML = '<span class="entity-name">' + escHtml(ent.name) +
        '</span> <span style="color:var(--text-dim)">(' + ent.field_count + ' fields)</span>' +
        ' <span class="entity-toggle">&#9660;</span>';
    header.onclick = function() { card.classList.toggle('expanded'); };

    var fields = document.createElement('div');
    fields.className = 'entity-fields';
    (ent.fields || []).forEach(function(f) {
        var row = document.createElement('div');
        row.className = 'entity-field';
        row.innerHTML = '<span class="f-name">' + escHtml(f.name) +
            '</span><span class="f-type">' + escHtml(f.type || 'unknown') + '</span>';
        fields.appendChild(row);
    });

    card.appendChild(header);
    card.appendChild(fields);
    return card;
}

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// ── Readiness Ring ─────────────────────────────────────────────────
function updateReadiness(data) {
    readinessData = data;
    var score = data.score || 0;
    var circumference = 37.7;
    var offset = circumference - (circumference * Math.min(score, 100) / 100);
    document.getElementById('ring-fill').style.strokeDashoffset = offset;
    $ring.title = 'Readiness: ' + Math.round(score) + '%';
    $ring.classList.toggle('full', score >= 100);
}

function showReadinessTooltip() {
    if (!readinessData) return;
    var html = '<div class="rt-title">Readiness: ' + readinessData.score + '%</div>';

    var criteria = readinessData.criteria || {};
    Object.keys(criteria).forEach(function(key) {
        var c = criteria[key];
        var icon = c.met ? '\u2713' : '\u2717';
        var cls = c.met ? 'met' : 'unmet';
        var detail = c.detail ? ' (' + c.detail + ')' : '';
        var scoreStr = c.score ? ' +' + c.score : '';
        html += '<div class="rt-item ' + cls + '">[' + icon + '] ' +
            escHtml(key) + detail + scoreStr + '</div>';
    });

    var suggestions = readinessData.suggestions || [];
    if (suggestions.length > 0) {
        html += '<div class="rt-suggestion">Tipp: ' + escHtml(suggestions[0]) + '</div>';
    }

    $tooltip.innerHTML = html;
    $tooltip.classList.toggle('visible');
}

$ring.addEventListener('click', function() {
    if (readinessData && readinessData.score >= 100) {
        triggerForge();
    } else {
        showReadinessTooltip();
    }
});

// Close tooltip on click outside
document.addEventListener('click', function(e) {
    if (!$ring.contains(e.target) && !$tooltip.contains(e.target)) {
        $tooltip.classList.remove('visible');
    }
});

// ── Session Management ─────────────────────────────────────────────
async function ensureSession() {
    if (sessionId) return sessionId;
    try {
        var body = {};
        var key = getApiKey();
        if (key) body.api_key = key;
        var resp = await fetch('/api/session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        var data = await resp.json();
        if (data.ok) {
            sessionId = data.session_id;
            return sessionId;
        }
        throw new Error(data.error || 'Session creation failed');
    } catch (err) {
        renderMessage({ role: 'error', content: 'Session-Fehler: ' + err.message });
        return null;
    }
}

// ── Send Message ───────────────────────────────────────────────────
var sending = false;

async function sendMessage() {
    var text = $input.value.trim();
    if (!text || sending) return;

    $input.value = '';
    autoResize();
    renderMessage({ role: 'user', content: text });

    // Check for forge trigger words
    var lower = text.toLowerCase();
    if (currentMode === 'create' && (lower === 'forge' || lower === 'materialisieren' || lower === 'bauen')) {
        triggerForge();
        return;
    }

    if (currentMode === 'create') {
        await sendCreateMessage(text);
    } else {
        // Discover mode stub — will be wired in S1c
        renderMessage({ role: 'system', content: 'Entdecken-Modus wird in S1c verdrahtet.' });
    }
}

async function sendCreateMessage(text) {
    sending = true;
    try {
        var sid = await ensureSession();
        if (!sid) { sending = false; return; }

        var resp = await fetch('/api/session/' + sid + '/message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });
        var data = await resp.json();

        if (!data.ok) {
            renderMessage({ role: 'error', content: data.error || 'Fehler bei der Verarbeitung.' });
            sending = false;
            return;
        }

        // System response
        renderMessage({ role: 'system', content: data.message });

        // Entity cards if present
        if (data.spec && data.spec.entities && data.spec.entities.length > 0) {
            renderMessage({ role: 'entities', entities: data.spec.entities });
        }

        // Readiness
        if (data.readiness) {
            updateReadiness(data.readiness);

            // Suggest forge if ready
            if (data.readiness.score >= 100) {
                renderMessage({
                    role: 'system',
                    html: 'Bereit zum Materialisieren. Tippe <span class="forge-suggest" onclick="triggerForge()">forge</span> oder dr\u00fcck den Ring.'
                });
            }
        }
    } catch (err) {
        renderMessage({ role: 'error', content: 'Netzwerkfehler: ' + err.message });
    }
    sending = false;
}

// ── Forge ──────────────────────────────────────────────────────────
var forging = false;

async function triggerForge() {
    if (forging || !sessionId) return;
    forging = true;

    renderMessage({ role: 'process', content: 'Materialisierung gestartet...' });

    try {
        var resp = await fetch('/api/session/' + sessionId + '/forge', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
        });
        var data = await resp.json();

        if (!data.ok) {
            renderMessage({ role: 'error', content: data.error || 'Forge konnte nicht gestartet werden.' });
            if (data.readiness) updateReadiness(data.readiness);
            forging = false;
            return;
        }

        renderMessage({ role: 'process', content: 'Forge gestartet. Output: ' + (data.output_dir || '...') });
        // Progress comes via WebSocket
    } catch (err) {
        renderMessage({ role: 'error', content: 'Forge-Fehler: ' + err.message });
        forging = false;
    }
}

// ── WebSocket ──────────────────────────────────────────────────────
function connectWs() {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var url = proto + '//' + location.host + '/events';
    try {
        ws = new WebSocket(url);
    } catch (e) { return; }

    ws.onopen = function() {
        // Subscribe to forge progress
        ws.send(JSON.stringify({ subscribe: ['forge_progress'] }));
    };

    ws.onmessage = function(evt) {
        try {
            var event = JSON.parse(evt.data);
            handleWsEvent(event);
        } catch (e) {}
    };

    ws.onclose = function() {
        ws = null;
        // Reconnect after 3s
        setTimeout(connectWs, 3000);
    };

    ws.onerror = function() {
        if (ws) ws.close();
    };
}

function handleWsEvent(event) {
    if (event.type !== 'forge_progress') return;
    var d = event.data || {};
    var evType = d.type || '';

    if (evType === 'forge:start') {
        renderMessage({ role: 'process', content: 'HDAG wird aufgebaut...' });
    } else if (evType === 'forge:node') {
        var line = '[' + d.index + '/' + d.total + '] ' + (d.file || d.atom_name || '');
        if (d.source) line += '  [' + d.source + ']';
        renderMessage({ role: 'process', content: line });
    } else if (evType === 'forge:compile') {
        var status = d.status === 'passed' ? '\u2713 PASSED' : '\u2717 FAILED';
        renderMessage({ role: 'process', content: 'cargo check: ' + status });
    } else if (evType === 'forge:complete') {
        forging = false;
        if (d.success) {
            var summary = 'Fertig. ' + (d.files || 0) + ' Dateien, ' +
                (d.loc || 0) + ' LOC, ' + (d.duration_secs || 0).toFixed(1) + 's.';
            if (d.output_dir) summary += '\nErgebnis: ' + d.output_dir;
            renderMessage({ role: 'system', content: summary });
        } else {
            renderMessage({ role: 'error', content: 'Forge fehlgeschlagen: ' + (d.error || 'Unbekannter Fehler') });
        }
    } else {
        // Generic forge progress
        if (d.phase) {
            var line = d.phase;
            if (d.index !== undefined) line = '[' + d.index + '/' + (d.total || '?') + '] ' + line;
            if (d.atom_name) line += ' ' + d.atom_name;
            if (d.source) line += '  [' + d.source + ']';
            if (d.status) line += ' — ' + d.status;
            renderMessage({ role: 'process', content: line });
        }
    }
}

// ── Input Helpers ──────────────────────────────────────────────────
function fillInput(text) {
    $input.value = text;
    $input.focus();
    autoResize();
}

function autoResize() {
    $input.style.height = 'auto';
    $input.style.height = Math.min($input.scrollHeight, 160) + 'px';
}

// ── Keyboard ───────────────────────────────────────────────────────
$input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

$input.addEventListener('input', autoResize);

// ── Touch Swipe (mobile mode switch) ───────────────────────────────
(function() {
    var startX = 0;
    document.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
    }, { passive: true });
    document.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - startX;
        if (Math.abs(dx) > 80) {
            switchMode(dx > 0 ? 'create' : 'discover');
        }
    }, { passive: true });
})();

// ── Init ───────────────────────────────────────────────────────────
updateEmptyState();
connectWs();
</script>
