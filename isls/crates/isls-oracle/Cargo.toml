[package]
name = "isls-oracle"
version = "1.0.0"
edition = "2021"
description = "LLM oracle interface supporting OpenAI and Anthropic providers (C25)"
authors = ["Sebastian Klemm"]
license = "MIT"

[dependencies]
isls-types       = { path = "../isls-types" }
isls-pmhd        = { path = "../isls-pmhd" }
isls-artifact-ir = { path = "../isls-artifact-ir" }
isls-forge       = { path = "../isls-forge" }
isls-capsule     = { path = "../isls-capsule" }
isls-store       = { path = "../isls-store" }
isls-consensus   = { path = "../isls-consensus" }
isls-manifest    = { path = "../isls-manifest" }
serde       = { workspace = true }
serde_json  = { workspace = true }
thiserror   = { workspace = true }
chrono      = { workspace = true }
sha2        = { workspace = true }
reqwest     = { workspace = true, optional = true }

[dev-dependencies]
isls-registry = { path = "../isls-registry" }
isls-archive  = { path = "../isls-archive" }

[features]
default = []
llm     = ["dep:reqwest"]
